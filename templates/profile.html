{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Back Button -->
    <div class="mb-6">
        <a href="/leaderboard" class="text-[#658C58] hover:text-[#31694E] font-semibold flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Leaderboard
        </a>
    </div>

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="flex flex-col md:flex-row items-center md:items-start gap-8">
            <!-- Profile Picture -->
            <div class="flex-shrink-0">
                <img id="profile-image" src="/static/profile_pics/default.jpg" alt="Profile Picture"
                    class="w-32 h-32 rounded-full object-cover border-4 border-[#658C58]">
            </div>

            <!-- Profile Information -->
            <div class="flex-1 text-center md:text-left">
                <h2 id="user-name" class="text-2xl font-bold text-[#111827] mb-2">Loading...</h2>
                <p id="user-username" class="text-[#6B7280] mb-4">@username</p>

                <!-- Points Badge -->
                <div
                    class="inline-flex items-center bg-[#F0E491] text-[#111827] px-4 py-2 rounded-full font-semibold mb-6">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                    <span id="user-points">0</span> Points
                </div>

                <!-- Note about public profile -->
                <p class="text-sm text-[#6B7280] italic">
                    This is a public profile. Contact information is private.
                </p>
            </div>
        </div>
    </div>

    <!-- Error Message -->
    <div id="error-message"
        class="hidden mt-6 bg-[#FEE2E2] border border-[#E74C3C] text-[#E74C3C] px-4 py-3 rounded-lg text-sm">
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
    import { showToast } from '/static/js/utils.js';

    const userId = {{ user_id }};

    async function loadUserProfile() {
        try {
            const response = await fetch(`/api/users/${userId}`);

            if (!response.ok) {
                if (response.status === 404) {
                    document.getElementById('error-message').textContent = 'User not found';
                    document.getElementById('error-message').classList.remove('hidden');
                }
                throw new Error('Failed to load profile');
            }

            const user = await response.json();

            // Update UI
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-username').textContent = `@${user.username}`;
            document.getElementById('user-points').textContent = user.points;
            document.getElementById('profile-image').src = user.image_path;

        } catch (error) {
            console.error('Profile error:', error);
            showToast('Failed to load profile', 'error');
        }
    }

    loadUserProfile();
</script>
{% endblock %}
