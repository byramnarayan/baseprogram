{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-[#111827] mb-2">My Dashboard</h1>
        <p class="text-[#6B7280]">View and manage your profile</p>
    </div>

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="flex flex-col md:flex-row items-center md:items-start gap-8">
            <!-- Profile Picture -->
            <div class="flex-shrink-0">
                <img id="profile-image" src="/static/profile_pics/default.jpg" alt="Profile Picture"
                    class="w-32 h-32 rounded-full object-cover border-4 border-[#658C58]">
            </div>

            <!-- Profile Information -->
            <div class="flex-1 text-center md:text-left">
                <h2 id="user-name" class="text-2xl font-bold text-[#111827] mb-2">Loading...</h2>
                <p id="user-username" class="text-[#6B7280] mb-4">@username</p>

                <!-- Points Badge -->
                <div
                    class="inline-flex items-center bg-[#F0E491] text-[#111827] px-4 py-2 rounded-full font-semibold mb-6">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                    <span id="user-points">0</span> Points
                </div>

                <!-- Contact Information -->
                <div class="space-y-3">
                    <div class="flex items-center justify-center md:justify-start text-[#6B7280]">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <span id="user-email">email@example.com</span>
                    </div>

                    <div class="flex items-center justify-center md:justify-start text-[#6B7280]">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <span id="user-phone">+1234567890</span>
                    </div>

                    <div id="user-address-container"
                        class="hidden flex items-center justify-center md:justify-start text-[#6B7280]">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span id="user-address"></span>
                    </div>
                </div>

                <!-- Edit Profile Button -->
                <div class="mt-6">
                    <a href="/profile/edit"
                        class="inline-block bg-[#658C58] hover:bg-[#31694E] text-white font-semibold px-6 py-3 rounded-xl transition-all duration-200">
                        Edit Profile
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ── 7-DAY STREAK WIDGET ── -->
    <div class="streak-widget" onclick="window.location.href='/challenge'" style="background:linear-gradient(135deg,#1B4332 0%,#31694E 100%);border-radius:16px;padding:1.25rem 1.5rem;margin:1.25rem 0;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(49,105,78,.3);">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;">
        <span style="font-size:1.4rem;">🔥</span>
        <span style="font-weight:700;color:white;font-size:1rem;flex:1;">Daily Plant Streak</span>
        <span id="streak-count" style="font-size:.8rem;background:rgba(187,200,99,.2);color:#BBC863;border:1px solid #BBC863;padding:.2rem .6rem;border-radius:20px;font-weight:600;">— day streak</span>
      </div>
      <div id="streak-days" style="display:flex;justify-content:space-between;gap:.4rem;margin-bottom:.75rem;"></div>
      <div style="font-size:.75rem;color:rgba(255,255,255,.5);text-align:right;">Tap to explore today's challenge →</div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script type="module">
    import { requireAuth } from '/static/js/auth.js';

    // Load user data
    async function loadUserData() {
        const user = await requireAuth();
        if (!user) return;

        // Update UI with user data
        document.getElementById('user-name').textContent = user.name;
        document.getElementById('user-username').textContent = `@${user.username}`;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-phone').textContent = user.phone;
        document.getElementById('user-points').textContent = user.points;
        document.getElementById('profile-image').src = user.image_path;

        // Show address if it exists
        if (user.address) {
            document.getElementById('user-address').textContent = user.address;
            document.getElementById('user-address-container').classList.remove('hidden');
        }
    }

    // Load data on page load
    loadUserData();

    // Streak widget
    (async function loadStreakWidget() {
      try {
        const res = await fetch("/challenge/streak/mini", {
          headers: { "Authorization": `Bearer ${localStorage.getItem("access_token") || ""}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById("streak-count").textContent = `${data.current_streak} day streak`;
        const today = new Date().toISOString().split("T")[0];
        const names = ["S","M","T","W","T","F","S"];
        const container = document.getElementById("streak-days");
        data.days.forEach(day => {
          const d = new Date(day.date + "T00:00:00");
          const isToday = day.date === today;
          const label = isToday ? "Today" : names[d.getDay()];
          let dotBg, dotColor, dotContent;
          if (day.verified) { dotBg="#BBC863"; dotColor="#1B4332"; dotContent="✓"; }
          else if (isToday) { dotBg="rgba(255,255,255,0.1)"; dotColor="rgba(255,255,255,0.5)"; dotContent="🌿"; }
          else { dotBg="rgba(239,68,68,0.25)"; dotColor="rgba(239,68,68,0.7)"; dotContent="✕"; }
          container.innerHTML += `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem;">
              <span style="font-size:.65rem;color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:600;">${label}</span>
              <span style="width:32px;height:32px;border-radius:50%;background:${dotBg};color:${dotColor};display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;">${dotContent}</span>
            </div>`;
        });
      } catch(e) {
        document.getElementById("streak-days").innerHTML = '<p style="color:rgba(255,255,255,.4);font-size:.8rem;">Start your streak today!</p>';
      }
    })();
</script>
{% endblock %}
