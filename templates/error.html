{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto text-center">
    <div class="bg-white rounded-2xl shadow-xl p-12">
        <!-- Error Icon -->
        <div class="mb-6">
            <svg class="w-24 h-24 mx-auto text-[#E74C3C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>

        <!-- Error Message -->
        <h1 class="text-4xl font-bold text-[#111827] mb-4">Oops! Something went wrong</h1>
        <p class="text-[#6B7280] text-lg mb-8">
            The page you're looking for doesn't exist or an error occurred.
        </p>

        <!-- Action Buttons -->
        <div class="flex gap-4 justify-center">
            <a href="/"
                class="bg-[#658C58] hover:bg-[#31694E] text-white font-semibold px-6 py-3 rounded-xl transition-all duration-200">
                Go Home
            </a>
            <a href="/leaderboard"
                class="bg-[#6B7280] hover:bg-[#4B5563] text-white font-semibold px-6 py-3 rounded-xl transition-all duration-200">
                View Leaderboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
